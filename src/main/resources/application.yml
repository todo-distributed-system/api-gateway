server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/gateway/app/todo/user/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/gateway/app/todo/auth/**
          filters:
            - StripPrefix=1