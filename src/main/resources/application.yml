server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/gateway/app/todo/user/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/gateway/app/todo/auth/**
          filters:
            - StripPrefix=1
